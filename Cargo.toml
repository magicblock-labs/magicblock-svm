[package]
name = "solana-svm"
description = "MagicBlock SVM (Patch of Solana SVM with extra features for ephemeral rollups)"
documentation = "https://docs.rs/solana-svm"
version = "3.1.11"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
repository = "https://github.com/anza-xyz/agave"
homepage = "https://anza.xyz/"
license = "Apache-2.0"
edition = "2021"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
crate-type = ["lib"]
name = "solana_svm"

[features]
agave-unstable-api = []
dev-context-only-utils = [
  "dep:qualifier_attr",
  "solana-program-runtime/dev-context-only-utils",
]
frozen-abi = [
  "dep:solana-frozen-abi",
  "dep:solana-frozen-abi-macro",
  "solana-program-runtime/frozen-abi",
]
shuttle-test = [
  "solana-bpf-loader-program/shuttle-test",
  "solana-loader-v4-program/shuttle-test",
  "solana-program-runtime/shuttle-test",
  "solana-svm-type-overrides/shuttle-test",
]
svm-internal = []

[dependencies]
ahash = "0.8.11"
log = "0.4.28"
percentage = "0.1.0"
qualifier_attr = { version = "0.2.2", optional = true }
serde = { version = "1.0.228", features = ["rc"] }
solana-account = "3.4"
solana-clock = "3.0"
solana-fee-structure = "3.0"
solana-frozen-abi = { version = "3.0", optional = true, features = [
  "frozen-abi",
] }
solana-frozen-abi-macro = { version = "3.0", optional = true, features = [
  "frozen-abi",
] }
solana-hash = "3.1"
solana-instruction = { version = "3.0", features = ["std"] }
solana-instructions-sysvar = "3.0"
solana-loader-v3-interface = { version = "6.1.0", features = ["bincode"] }
solana-loader-v4-interface = "3.1"
solana-loader-v4-program = { version = "3.1", features = [
  "agave-unstable-api",
] }
solana-message = "3.0"
solana-nonce = "3.0"
solana-nonce-account = "3.0"
solana-program-entrypoint = "3.1"
solana-program-pack = "3.1"
solana-program-runtime = { version = "3.1", features = ["metrics"] }
solana-pubkey = "3.0"
solana-rent = "3.0"
solana-sdk-ids = "3.0"
solana-svm-callback = "3.1"
solana-svm-feature-set = "3.1"
solana-svm-log-collector = "3.1"
solana-svm-measure = "3.1"
solana-svm-timings = "3.1"
solana-svm-transaction = "3.1"
solana-svm-type-overrides = "3.1"
solana-system-interface = "2.0"
solana-sysvar-id = "3.0"
solana-transaction-context = "3.1"
solana-transaction-error = "3.0"
spl-generic-token = "2.0"
thiserror = "2.0"

[dev-dependencies]
agave-logger = { version = "3.1", features = ["agave-unstable-api"] }
agave-syscalls = "3.1"
assert_matches = "1.5.0"
bincode = "1.3.3"
ed25519-dalek = "=1.0.1"
libsecp256k1 = { version = "0.6.0", default-features = false, features = [
  "std",
  "static-context",
] }
openssl = "0.10"
rand0-7 = { package = "rand", version = "0.7" }
shuttle = "0.7.1"
solana-bpf-loader-program = "3.1"
solana-clock = "3.0.0"
solana-compute-budget = { version = "3.1", features = ["agave-unstable-api"] }
solana-compute-budget-interface = "3.0"
solana-compute-budget-program = { version = "3.1", features = [
  "agave-unstable-api",
] }
solana-ed25519-program = "3.0"
solana-epoch-schedule = "3.0"
solana-fee-calculator = "3.0"
solana-keypair = "3.0"
solana-native-token = "3.0"
solana-precompile-error = "3.0"
solana-program-binaries = { version = "3.1", features = ["agave-unstable-api"] }
solana-program-runtime = { version = "3.1", features = [
  "dev-context-only-utils",
] }
solana-pubkey = { version = "3.0", features = ["rand"] }
solana-rent = "3.0"
solana-sbpf = { version = "0.13.1", features = ["jit"] }
solana-secp256k1-program = { version = "3.0", features = ["bincode"] }
solana-secp256r1-program = { version = "3.0", features = ["openssl-vendored"] }
solana-signature = { version = "3.1.0", features = ["rand"] }
solana-signer = "3.0"
# See order-crates-for-publishing.py for using this unusual `path = "."`
solana-svm = { path = ".", features = [
  "agave-unstable-api",
  "dev-context-only-utils",
  "svm-internal",
] }
solana-system-program = { version = "3.1", features = ["agave-unstable-api"] }
solana-system-transaction = "3.0"
solana-sysvar = "3.0"
solana-transaction = { version = "3.0", features = ["dev-context-only-utils"] }
solana-transaction-context = { version = "3.1", features = [
  "dev-context-only-utils",
] }
spl-token-interface = "2.0"
test-case = "3.3"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
  'cfg(target_os, values("solana"))',
  'cfg(feature, values("frozen-abi", "no-entrypoint"))',
]

[patch.crates-io]
solana-account = { git = "https://github.com/magicblock-labs/solana-account.git", branch = "v3" }
